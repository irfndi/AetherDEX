[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.31"
optimizer = true
optimizer_runs = 1000
evm_version = "cancun"
via_ir = true
ffi = true
fs_permissions = [{ access = "read", path = "./" }]
gas_reports = ["AetherRouter", "AetherFactory", "AetherHook"]
auto_detect_solc = true
revert_strings = "strip"

[profile.default.fuzz]
runs = 1000

[profile.ci]
ffi = false
verbosity = 4

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"

[doc]
out = "docs"
title = "AetherDEX"
