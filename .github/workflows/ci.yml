name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:

      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Install forge dependencies
        working-directory: packages/contracts
        run: |
          forge install foundry-rs/forge-std --no-commit || true
          forge install Uniswap/v4-core --no-commit || true
          forge install OpenZeppelin/openzeppelin-contracts@v5 --no-commit || true
      - name: Build contracts
        working-directory: packages/contracts
        run: forge build --via-ir
      - name: Run tests
        working-directory: packages/contracts
        run: forge test -vvv
      - name: Coverage
        working-directory: packages/contracts
        run: forge coverage --report summary --ir-minimum
        continue-on-error: true
      - name: Slither static analysis
        working-directory: packages/contracts
        run: |
          if command -v slither &> /dev/null; then
            slither . --filter-paths "lib/|test/" || true
          else
            echo "Slither not installed, skipping"
          fi
        continue-on-error: true
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: packages/contracts/coverage.lcov
          flags: contracts
          fail_ci_if_error: false

  backend:
    name: Backend (Workers + Effect)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test
        continue-on-error: true  # apps don't have tests yet
      - name: Coverage
        run: bun run test:coverage
        continue-on-error: true
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: apps/api/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  frontend:
    name: Frontend (Vite + React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Generate route tree
        working-directory: apps/web
        run: bunx @tanstack/router-cli generate

      - name: Typecheck
        working-directory: apps/web
        run: bun run typecheck
      - name: Lint
        working-directory: apps/web
        run: bun run lint
      - name: Test
        working-directory: apps/web
        run: bun run test
        continue-on-error: true
      - name: Build
        working-directory: apps/web
        run: bun run build
        continue-on-error: true  # apps don't have build yet
      - name: Coverage
        working-directory: apps/web
        run: bun run test:coverage
        continue-on-error: true
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: apps/web/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [contracts, backend, frontend]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.contracts.result }}" != "success" ] || \
             [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
